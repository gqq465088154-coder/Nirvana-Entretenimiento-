services:
  postgres:
    image: postgres:16.4-alpine
    container_name: nirvana-postgres
    environment:
      POSTGRES_DB: nirvana
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nirvana"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4.1-alpine
    container_name: nirvana-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      target: backend-runner
    container_name: nirvana-backend
    environment:
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-nirvana_dev_secret}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/nirvana
      REDIS_URL: redis://redis:6379
      DB_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      target: web-runner
    container_name: nirvana-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
