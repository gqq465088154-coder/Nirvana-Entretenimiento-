services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    env_file: docker.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nirvana} -d ${POSTGRES_DB:-nirvana}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:${REDIS_HOST_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runner
    restart: unless-stopped
    env_file: docker.env
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${API_HOST_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${WEB_HOST_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
