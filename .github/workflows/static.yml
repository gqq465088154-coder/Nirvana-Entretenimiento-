# CI workflow: build + lint + backend smoke test
name: CI

on:
  push:
    branches: ['main', 'copilot/**']
  pull_request:
    branches: ['main']

jobs:
  build-web:
    name: Build web frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:web

      - name: Build
        run: npm run build:web

  smoke-backend:
    name: Backend smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start backend and run smoke tests
        run: |
          npm run dev:backend &
          # Wait for the server to accept any HTTP response.
          # The health endpoint returns 503 when postgres/redis are unavailable in CI;
          # that is expected and acceptable – it confirms the server is running.
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/health 2>/dev/null || true)
            if [[ "$STATUS" =~ ^[25] ]]; then
              echo "Backend is up (HTTP $STATUS)"
              break
            fi
            echo "Waiting… ($i, last status: ${STATUS:-none})"
            sleep 2
          done

          # Confirm health endpoint responds.
          # 5xx is acceptable here because postgres/redis are not available in CI.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/api/health || true)
          echo "Health status: $STATUS"
          [[ "$STATUS" =~ ^[25] ]] || { echo "Health endpoint did not respond"; exit 1; }

          # Auth login
          TOKEN=$(curl -sf http://localhost:4000/api/auth/login \
            -H 'content-type: application/json' \
            -d '{"username":"nirvana-admin","password":"nirvana-2026"}' \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>process.stdout.write(JSON.parse(d).accessToken))")
          echo "Token acquired: ${TOKEN:0:20}…"

          # Protected sportsbook route
          curl -sf http://localhost:4000/api/sportsbook/markets \
            -H "authorization: Bearer $TOKEN"

          # Protected casino route
          curl -sf http://localhost:4000/api/casino/games \
            -H "authorization: Bearer $TOKEN"

          echo "All smoke tests passed ✓"


